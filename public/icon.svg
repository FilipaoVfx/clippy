<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Clippy">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so maskable crop is safe -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- clipboard board (kept within central safe zone) -->
  <rect x="150" y="150" width="212" height="248" rx="28" fill="#ffffff"/>
  <!-- clip tab -->
  <rect x="214" y="120" width="84" height="60" rx="18" fill="#ffffff"/>
  <rect x="236" y="128" width="40" height="30" rx="12" fill="url(#bg)"/>
  <!-- text lines -->
  <rect x="188" y="222" width="136" height="20" rx="10" fill="url(#line)"/>
  <rect x="188" y="272" width="136" height="20" rx="10" fill="url(#line)" opacity="0.75"/>
  <rect x="188" y="322" width="92"  height="20" rx="10" fill="url(#line)" opacity="0.5"/>
</svg>
