name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-cloudflare:
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT: ${{ vars.CF_PAGES_PROJECT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm clean-install --progress=false

      - name: Verify Cloudflare authentication
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT:-clippy-pages}"
          if npx wrangler pages project list --json | jq -e --arg NAME "$PROJECT_NAME" '.[] | select(.name == $NAME)' > /dev/null; then
            echo "Using existing Pages project: $PROJECT_NAME"
          else
            echo "Pages project not found, creating: $PROJECT_NAME"
            npx wrangler pages project create "$PROJECT_NAME" --production-branch main
          fi

      - name: Deploy realtime Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run cf:realtime:deploy

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT:-clippy-pages}"
          npx wrangler pages deploy ./public --project-name "$PROJECT_NAME"
